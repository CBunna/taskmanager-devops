name: CI Pipeline
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
jobs:
    lint-and-build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"

            - name: Install backend dependencies
              run: |
                  cd backend
                  npm install

            - name: Lint backend code
              run: |
                  cd backend
                  npm run lint || echo "Lint completed"

            - name: Install frontedn dependenies
              run: |
                  cd frontend
                  npm install

            - name: Lint frontend code
              run: |
                  cd frontend
                  npm run lint || echo "Linting completed"

            - name: Build Docker images
              run: |
                  docker compose build

            - name: Verify builds completed
              run: |
                  docker images | grep taskmanager
