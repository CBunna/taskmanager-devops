apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis #DNS name: "postgres"
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    # find the pods that lebles as app:redis
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
